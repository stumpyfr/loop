name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test ./... -covermode=atomic -coverprofile=coverage.out

      - name: Enforce minimum coverage
        run: |
          coverage="$(go tool cover -func=coverage.out | awk '/^total:/ { sub(/%/, "", $3); print $3 }')"
          awk -v coverage="$coverage" 'BEGIN { if (coverage < 80.0) { printf("coverage %.1f%% is below required 80.0%%\n", coverage); exit 1 } }'
          printf "coverage %.1f%% meets required 80.0%%\n" "$coverage"

      - name: Build binary
        run: go build -trimpath -o /tmp/loop_cli .

      - name: Validate bundled loop fixture
        run: |
          go run . validate testdata/valid_loop.yml
          NO_COLOR=1 go run . render --details testdata/valid_loop.yml >/tmp/valid_loop.rendered.txt

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: loop-cli-coverage
          path: coverage.out
          if-no-files-found: error

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: manual

      - name: Build for CodeQL
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
